<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AR Test</title>
  <link rel="stylesheet" href="test2.css">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body>
  <a-scene embedded arjs='sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3_HAMMING63;'>
    <!-- <a-box position="0 -1 -5" color="blue" rotation="0 45 0"></a-box> -->
    <a-marker type="barcode" value="0">
        <a-box position="0 0 0" color="blue" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="1">
        <a-box position="0 0 0" color="green" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="2">
        <a-box position="0 0 0" color="red" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="3">
        <a-box position="0 0 0" color="orange" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="4">
        <a-box position="0 0 0" color="yellow" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="5">
        <a-box position="0 0 0" color="white" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="6">
        <a-box position="0 0 0" color="black" rotation="0 45 0"></a-box>
    </a-marker>
    <a-marker type="barcode" value="7">
        <a-box position="0 0 0" color="purple" rotation="0 45 0"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <div id="overlays">
    <button id="request-permissions">Request</button>
    <button id="hide-overlay">Hide</button>
    <div id="vals">
      <div>
        <h1>Orientation</h1>
        <div>absolute: <span id="absolute">NULL</span></div>
        <div>alpha: <span id="alpha">NULL</span></div>
        <div>beta: <span id="beta">NULL</span></div>
        <div>gamma: <span id="gamma">NULL</span></div>
      </div>
      <div>
        <h1>Motion</h1>
        <div>acceleration: <span id="acceleration">NULL</span></div>
        <div>rotationRate: <span id="rotation-rate">NULL</span></div>
        <div>interval: <span id="interval">NULL</span></div>
      </div>
    </div>
  </div>
  <script src="test1.js"></script>
  <!-- <script src="test2.js"></script> -->
</body>

</html>
