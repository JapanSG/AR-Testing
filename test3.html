<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>4Markers</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link rel="stylesheet" href="test2.css">
</head>

<body style="margin: 0px; overflow: hidden;">
  <a-scene embedded
    arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3_HAMMING63; debugUIEnabled: false;"
    hybrid-coordinator>

    <a-marker type="barcode" value="1" id="m1"></a-marker>
    <a-marker type="barcode" value="2" id="m2"></a-marker>
    <a-marker type="barcode" value="3" id="m3"></a-marker>
    <a-marker type="barcode" value="4" id="m4"></a-marker>

    <a-box id="ar-world" visible="false" color="green" height="1" width="16" depth="8"></a-box>
    <a-entity id="camera" camera></a-entity>
  </a-scene>

  <div id="overlays">
    <button id="request-permissions">Request</button>
    <button id="hide-overlay">Hide</button>
    <div id="vals">
      <div id="rotation">Null</div>
      <div id="position">Null</div>
      <div id="c-rot">Null</div>
      <div id="c-pos">Null</div>
      <div id="tracked">NOT TRACKING</div>
      <div>
        <h1>Orientation</h1>
        <div>absolute: <span id="absolute">NULL</span></div>
        <div>alpha: <span id="alpha">NULL</span></div>
        <div>beta: <span id="beta">NULL</span></div>
        <div>gamma: <span id="gamma">NULL</span></div>
      </div>
      <div>
        <h1>Motion</h1>
        <div>acceleration: <span id="acceleration">NULL</span></div>
        <div>rotationRate: <span id="rotation-rate">NULL</span></div>
        <div>interval: <span id="interval">NULL</span></div>
      </div>
    </div>
  </div>
  <script src="4marker.js"></script>
</body>

</html>
